# =============================================================
# Nginx Gateway — DocPlatform (extraction_specific_PDF)
# =============================================================
# Использование (production):
#   sudo nginx -c /path/to/project/gateway/nginx.conf -t   # проверка
#   sudo nginx -c /path/to/project/gateway/nginx.conf       # запуск
#
# Переменная PROJECT_ROOT ниже — замените на реальный путь до проекта
# перед деплоем. Или подставьте через envsubst:
#   PROJECT_ROOT=/home/user/project envsubst < nginx.conf | sudo nginx -c /dev/stdin
#
# После перехода на Nginx убрать flask-cors из обоих сервисов
# (браузер видит один origin :8080 — CORS не требуется).
# =============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;

    gzip          on;
    gzip_types    text/css application/javascript application/json text/plain application/xml;
    gzip_min_length 1024;

    # Лимит размера загружаемого файла (PDF)
    client_max_body_size 50M;

    # Rate limiting: 10 req/sec per IP, burst до 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/docplatform-access.log main;
    error_log  /var/log/nginx/docplatform-error.log  warn;

    # ── Upstream бэкенды ──────────────────────────────────────

    upstream spec_converter {
        server 127.0.0.1:5001;
    }

    upstream invoice_extractor {
        server 127.0.0.1:5002;
    }

    # ── Виртуальный хост ──────────────────────────────────────

    server {
        listen 8080;
        server_name _;

        # === Путь к статике: замените на реальный PROJECT_ROOT ===
        root /home/user/projects/extraction_specific_PDF;
        index shell/index.html;

        # / → Shell App
        location = / {
            return 302 /shell/index.html;
        }

        location /shell/ {
            try_files $uri $uri/ /shell/index.html;
        }

        # ── Spec Converter API ──────────────────────────────

        location /api/spec-converter/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://spec_converter/;
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Передаём X-* заголовки от бэкенда клиенту
            proxy_pass_header X-Vision-Fallback;
            proxy_pass_header X-Sheet-Names;
        }

        # ── Invoice Extractor API ───────────────────────────

        location /api/invoice-extractor/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://invoice_extractor/;
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Передаём X-* заголовки от бэкенда клиенту
            proxy_pass_header X-Vision-Fallback;
            proxy_pass_header X-Document-Type;
            proxy_pass_header X-Parse-Quality;
            proxy_pass_header X-Job-Id;
            proxy_pass_header X-Invoice-Number;
        }

        # ── Отключить листинг директорий ───────────────────
        autoindex off;
    }
}
